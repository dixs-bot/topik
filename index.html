const DUMMY = [
    {id:1,title:'Pemerintah Resmikan Proyek Infrastruktur Terbesar di IKN Nusantara',summary:'Presiden meresmikan pembangunan jalan tol dan fasilitas publik senilai Rp 120 triliun di IKN sebagai tonggak sejarah baru pembangunan Indonesia.',content:'<p>Jakarta — Presiden RI meresmikan pembangunan tahap kedua infrastruktur utama di Ibu Kota Nusantara (IKN), Kalimantan Timur. Proyek senilai Rp 120 triliun ini mencakup jalan tol 45 kilometer, jembatan penghubung, serta pusat pemerintahan terintegrasi berkonsep kota hijau.</p><p>Menteri PUPR menyatakan pembangunan melibatkan lebih dari 50.000 pekerja. "Ini proyek infrastruktur terbesar dalam sejarah Indonesia," ujarnya.</p><p>Investasi swasta di IKN hingga Q1 2025 mencapai Rp 35 triliun dengan potensi peningkatan signifikan dalam dua tahun ke depan.</p>',slug:'infrastruktur-terbesar-ikn',category:1,categories:[1],tags:[{name:'IKN'},{name:'Infrastruktur'},{name:'Pembangunan'}],author:{name:'Ahmad Rizky',slug:'ahmad-rizky'},date:'2025-05-12T08:30:00',featured_media:'https://picsum.photos/seed/ikn2/800/500',views:45200,headline:true,breaking:true,ext_link:''},
    {id:2,title:'Gempa M6.2 Guncang Sulawesi Tengah, Tidak Berpotensi Tsunami',summary:'BMKG mencatat gempa 6.2 SR di Sulawesi Tengah. Belum ada laporan korban jiwa atau kerusakan signifikan.',content:'<p>Palu — BMKG melaporkan gempa 6.2 SR mengguncang Donggala, Sulawesi Tengah, pada kedalaman 10 km.</p><p>BPBD memastikan belum ada korban jiwa. Warga pesisir sudah tenang setelah konfirmasi tidak ada potensi tsunami.</p><p>BMKG mengimbau masyarakat waspada gempa susulan dalam beberapa jam ke depan.</p>',slug:'gempa-sulteng-62',category:1,categories:[1],tags:[{name:'Gempa'},{name:'BMKG'}],author:{name:'Siti Nurhaliza',slug:'siti-nurhaliza'},date:'2025-05-13T14:30:00',featured_media:'https://picsum.photos/seed/gempa2/800/500',views:38700,headline:false,breaking:true,ext_link:''},
    {id:3,title:'KPK Tetapkan Tiga Tersangka Kasus Korupsi Proyek Pertanian',summary:'KPK menetapkan tiga tersangka baru dalam kasus korupsi proyek pertanian senilai Rp 500 miliar.',content:'<p>Jakarta — KPK menetapkan tiga tersangka dalam kasus dugaan korupsi pengadaan pupuk dan alat pertanian di Kementan 2023-2024. Kerugian negara diperkirakan Rp 500 miliar.</p><p>"Tersangka mengatur proses tender agar dimenangkan perusahaan tertentu," ujar Wakil Ketua KPK.</p>',slug:'kpk-korupsi-pertanian',category:1,categories:[1],tags:[{name:'KPK'},{name:'Korupsi'}],author:{name:'Budi Santoso',slug:'budi-santoso'},date:'2025-05-11T10:15:00',featured_media:'https://picsum.photos/seed/kpk2/800/500',views:52100,headline:false,breaking:false,ext_link:''},
    {id:4,title:'PBB Gelar Sidang Darurat Tanggapi Eskalasi Konflik Timur Tengah',summary:'Dewan Keamanan PBB mengadakan sidang darurat untuk membahas eskalasi konflik yang mengancam stabilitas kawasan.',content:'<p>New York — Dewan Keamanan PBB gelar sidang darurat menanggapi eskalasi konflik bersenjata di Timur Tengah.</p><p>Sekretaris Jenderal PBB menyerukan semua pihak menahan diri dan kembali ke meja perundingan.</p>',slug:'pbb-sidang-darurat-timur-tengah',category:2,categories:[2],tags:[{name:'PBB'},{name:'Timur Tengah'}],author:{name:'Diana Putri',slug:'diana-putri'},date:'2025-05-14T09:00:00',featured_media:'https://picsum.photos/seed/pbb2/800/500',views:41300,headline:true,breaking:true,ext_link:''},
    {id:5,title:'Uni Eropa Sahkan Regulasi AI Paling Komprehensif di Dunia',summary:'EU AI Act resmi disahkan Parlemen Eropa, mengatur penggunaan kecerdasan buatan di seluruh wilayah UE.',content:'<p>Brussel — EU AI Act, regulasi AI paling komprehensif di dunia, berlaku efektif 2026 dengan masa transisi bertahap.</p><p>Sistem AI dikategorikan berdasarkan risiko. Pengenalan wajah real-time dibatasi ketat.</p>',slug:'eu-ai-act-disahkan',category:2,categories:[2],tags:[{name:'Uni Eropa'},{name:'AI'},{name:'Regulasi'}],author:{name:'Marco Valentino',slug:'marco-valentino'},date:'2025-05-15T11:45:00',featured_media:'https://picsum.photos/seed/euai2/800/500',views:29800,headline:false,breaking:false,ext_link:''},
    {id:6,title:'Rupiah Menguat ke Level 15.200 Setelah Keputusan The Fed',summary:'Rupiah menguat signifikan ke Rp 15.200/USD setelah sinyal dovish dari Federal Reserve.',content:'<p>Jakarta — Rupiah menguat ke level terkuat dalam 6 bulan setelah The Fed memberikan sinyal pemangkasan suku bunga.</p><p>Gubernur BI menyatakan penguatan mencerminkan fundamental ekonomi yang solid. Ekonom memproyeksikan Rupiah bisa tembus Rp 15.000.</p>',slug:'rupiah-menguat-the-fed',category:3,categories:[3],tags:[{name:'Rupiah'},{name:'The Fed'}],author:{name:'Fitri Handayani',slug:'fitri-handayani'},date:'2025-05-16T09:30:00',featured_media:'https://picsum.photos/seed/rupiah2/800/500',views:33500,headline:true,breaking:false,ext_link:''},
    {id:7,title:'Bank Indonesia Pertahankan Suku Bunga Acuan 6 Persen',summary:'BI pertahankan BI7DRR di 6% guna menjaga stabilitas makroekonomi.',content:'<p>Jakarta — BI mempertahankan suku bunga acuan di 6%. "Ruang penurunan masih terbuka, tapi kami ingin pastikan inflasi terkendali berkelanjutan," jelas Gubernur BI.</p>',slug:'bi-bunga-6-persen',category:3,categories:[3],tags:[{name:'Bank Indonesia'},{name:'Suku Bunga'}],author:{name:'Rina Wulandari',slug:'rina-wulandari'},date:'2025-05-15T15:00:00',featured_media:'https://picsum.photos/seed/bi2/800/500',views:27600,headline:false,breaking:false,ext_link:''},
    {id:8,title:'Startup Fintech Indonesia Raih Pendanaan Seri C $80 Juta',summary:'Platform pembayaran digital meraih pendanaan Seri C yang dipimpin Sequoia Capital Asia.',content:'<p>Jakarta — PayNow Indonesia raih pendanaan Seri C USD 80 juta dari Sequoia Capital Asia dan SoftBank Vision Fund. Dana akan memperluas layanan ke 200 kota baru.</p>',slug:'fintech-seri-c-80-juta',category:3,categories:[3],tags:[{name:'Startup'},{name:'Fintech'}],author:{name:'Denny Setiawan',slug:'denny-setiawan'},date:'2025-05-13T11:00:00',featured_media:'https://picsum.photos/seed/fin2/800/500',views:19200,headline:false,breaking:false,ext_link:''},

/* ========================================================================
   WORDPRESS API LAYER
   ======================================================================== */
function wpUrl(endpoint){ return WP_CONFIG.url.replace(/\/$/,'') + '/wp-json/wp/v2/' + endpoint; }

async function wpFetch(endpoint, params={}){
    if(!WP_CONFIG.url) return null;
    const key = endpoint + JSON.stringify(params);
    if(apiCache[key] && (Date.now()-apiCache[key].t < WP_CONFIG.cacheMs)) return apiCache[key].d;
    try {
        showWPStatus('Menghubungi WordPress...','load');
        const qs = new URLSearchParams({_embed:true,per_page:WP_CONFIG.perPage,...params}).toString();
        const r = await fetch(wpUrl(endpoint+'?'+qs), {next:{revalidate:300}});
        if(!r.ok) throw new Error('HTTP '+r.status);
        const total = parseInt(r.headers.get('X-WP-Total')||'0');
        const data = await r.json();
        apiCache[key] = {d:{data,total},t:Date.now()};
        showWPStatus('WordPress terhubung','ok');
        setTimeout(()=>hideWPStatus(),2500);
        S.wpOk = true;
        return {data,total};
    } catch(e){
        showWPStatus('Gagal terhubung ke WordPress — menggunakan data lokal','err');
        setTimeout(()=>hideWPStatus(),4000);
        S.wpOk = false;
        return null;
    }
}

// Normalisasi data WP ke format internal
function normalizeWP(post){
    const embedded = post._embedded||{};
    const media = (embedded['wp:featuredmedia']||[])[0];
    const author = (embedded['author']||[])[0];
    const cats = embedded['wp:term']?.filter(t=>t.taxonomy==='category')||post.categories||[];
    const tags = embedded['wp:term']?.filter(t=>t.taxonomy==='post_tag')||post.tags||[];
    return {
        id:post.id,
        title:post.title.rendered.replace(/<[^>]*>/g,''),
        summary:post.excerpt.rendered.replace(/<[^>]*>/g,'').substring(0,180),
        content:post.content.rendered,
        slug:post.slug,
        category:cats[0]?.id||0,
        categories:cats.map(c=>({id:c.id,name:c.name,slug:c.slug})),
        tags:tags.map(t=>({id:t.id,name:t.name,slug:t.slug})),
        author:{name:author?.name||'Redaksi',slug:author?.slug||''},
        date:post.date,
        featured_media:media?.source_url||'https://picsum.photos/seed/wpfb'+post.id+'/800/500',
        views:0,
        headline:false,
        breaking:false,
        ext_link:''
    };
}

// Fetch semua artikel (WP atau dummy)
async function fetchPosts(params={}){
    const wp = await wpFetch('posts',params);
    if(wp) return wp.data.map(normalizeWP);
    return [...DUMMY];
}

async function fetchPostBySlug(slug){
    const wp = await wpFetch('posts',{slug});
    if(wp && wp.data.length) return normalizeWP(wp.data[0]);
    return DUMMY.find(a=>a.slug===slug)||null;
}

async function fetchPostsByCategory(catId){
    const wp = await wpFetch('posts',{categories:catId});
    if(wp) return wp.data.map(normalizeWP);
    return DUMMY.filter(a=>a.categories?.includes(catId)||a.category===catId);
}

async function fetchCategories(){
    if(WP_CONFIG.url){
        const wp = await wpFetch('categories',{per_page:50});
        if(wp) return wp.data.map(c=>({id:c.id,name:c.name,slug:c.slug,icon:'fa-folder'}));
    }
    return CATS;
}

function fmtAgo(d){ const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60)return'Baru saja';if(s<3600)return Math.floor(s/60)+' mnt lalu';if(s<86400)return Math.floor(s/3600)+' jam lalu';if(s<604800)return Math.floor(s/86400)+' hari lalu';return fmtDate(d); }
function fmtViews(n){ return n>=1000?(n/1000).toFixed(1).replace('.0','')+'K':String(n); }
function readTime(c){ return Math.max(2,Math.ceil(c.replace(/<[^>]*>/g,'').split(/\s+/).length/200)); }
function catCls(id){ const c=CATS.find(x=>x.id===id); return c?'cat-'+c.slug:'cat-uncategorized'; }
function catName(id){ const c=CATS.find(x=>x.id===id); return c?c.name:'Lainnya'; }

function catClsByObj(cats){ return cats&&cats.length?'cat-'+(cats[0].slug||'uncategorized'):'cat-uncategorized'; }
function toast(m,t='success'){ const c=document.getElementById('tc'); const cl={success:'bg-green-600',error:'bg-red-600',info:'bg-blue-600'}; const ic={success:'fa-check-circle',error:'fa-exclamation-circle',info:'fa-info-circle'}; const e=document.createElement('div'); e.className=`${cl[t]} text-white px-5 py-3 rounded-lg shadow-lg flex items-center gap-3 text-sm font-medium animate-fadeUp max-w-xs`; e.innerHTML=`<i class="fas ${ic[t]}"></i><span>${m}</span>`; c.appendChild(e); setTimeout(()=>{e.style.opacity='0';e.style.transform='translateY(10px)';e.style.transition='all .3s';setTimeout(()=>e.remove(),300)},3000); }
function showWPStatus(m,t){ const e=document.getElementById('wp-status'); e.textContent=m; e.className='wp-status '+t+' show'; }

function adBanner(key, cls=''){

function adSense(key, cls=''){
    if(!ADSENSE.enabled) return '';
    const slot = ADSENSE.slots[key];
    if(!slot) return '';
    const isV = slot.format==='vertical';
    return `<div class="${cls}"><ins class="adsbygoogle" style="display:block${isV?'':';text-align:center'}" data-ad-client="${ADSENSE.client}" data-ad-slot="${slot.id}" data-ad-format="${slot.format}" data-full-width-responsive="true"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});<\/script></div>`;
}

function parseRoute(){
    const h=window.location.hash.slice(1)||'/'; const p=h.split('/').filter(Boolean);
    if(!p.length||p[0]==='') return {page:'home'};
    if(p[0]==='kategori'&&p[1]) return {page:'category',cat:p[1]};
    if(p[0]==='artikel'&&p[1]) return {page:'article',slug:p[1]};
    if(p[0]==='admin') return {page:'admin'};
    if(p[0]==='cari') return {page:'search',q:p.slice(1).join('/')};
    return {page:'home'};
}
async function handleRoute(){
    const r=parseRoute(); S.page=r.page; S.cat=r.cat||null; S.slug=r.slug||null; S.q=r.q?decodeURIComponent(r.q):''; S.count=12;
    renderNav(); renderFooter();
    switch(S.page){
        case 'home': await renderHome(); break;
        case 'category': await renderCat(); break;
        case 'article': await renderArt(); break;
        case 'search': renderSearch(); break;
        case 'admin': renderAdmin(); break;
        default: await renderHome();

    window.scrollTo({top:0,behavior:'instant'});
}

            <div><h1 class="text-xl sm:text-2xl font-bold font-headline flex items-center gap-2"><i class="fas fa-user-shield text-brand"></i>Admin Panel</h1><p class="text-sm text-gray-400 mt-1">Kelola berita & iklan — Data Source: ${WP_CONFIG.url?'<span class="text-green-500">WordPress API</span>':'<span class="text-yellow-500">Data Lokal (Dummy)</span>'}</p></div>
            <div class="flex gap-2"><button onclick="openForm()" class="inline-flex items-center gap-2 px-5 py-2.5 bg-brand hover:bg-brand-dark text-white rounded-lg text-sm font-semibold transition"><i class="fas fa-plus text-xs"></i>Tambah Berita (Link)</button><button onclick="S.admin=false;localStorage.removeItem('bk-a');toast('Keluar','info');navigate('/')" class="inline-flex items-center gap-2 px-4 py-2.5 bg-gray-200 dark:bg-surface-card hover:bg-gray-300 dark:hover:bg-surface-border rounded-lg text-sm font-medium transition"><i class="fas fa-sign-out-alt text-xs"></i>Keluar</button></div>
        </div>
        <div class="bg-blue-50 dark:bg-blue-900/10 border border-blue-200 dark:border-blue-800/30 rounded-xl p-4 mb-6"><h3 class="font-semibold text-sm text-blue-800 dark:text-blue-300 mb-1"><i class="fas fa-plug mr-1"></i>Koneksi WordPress</h3><p class="text-xs text-blue-600 dark:text-blue-400">Status: <strong>${S.wpOk===null?'Belum dicek':S.wpOk?'<span class="text-green-600">Terhubung</span>':'<span class="text-red-500">Gagal — menggunakan data lokal</span>'}</strong>. Untuk menghubungkan, edit <code class="bg-blue-100 dark:bg-blue-900/30 px-1 rounded text-[11px]">WP_CONFIG.url</code> di script.</p></div>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-6"><div class="bg-white dark:bg-surface-card rounded-xl p-4 border border-gray-100 dark:border-surface-border"><p class="text-xs text-gray-400 mb-1">Total Berita</p><p class="text-2xl font-bold">${all.length}</p></div><div class="bg-white dark:bg-surface-card rounded-xl p-4 border border-gray-100 dark:border-surface-border"><p class="text-xs text-gray-400 mb-1">Tipe Link</p><p class="text-2xl font-bold text-orange-500">${all.filter(a=>a.ext_link).length}</p></div><div class="bg-white dark:bg-surface-card rounded-xl p-4 border border-gray-100 dark:border-surface-border"><p class="text-xs text-gray-400 mb-1">Banner Aktif</p><p class="text-2xl font-bold text-brand">${Object.values(ADS).filter(a=>a.on).length}</p></div></div>
        <div class="bg-white dark:bg-surface-card rounded-xl border border-gray-100 dark:border-surface-border overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100 dark:border-surface-border flex items-center justify-between"><h2 class="font-bold text-sm">Artikel Lokal (Link)</h2><span class="text-xs text-gray-400">${arts.length} artikel</span></div>
            ${arts.length===0?'<div class="p-8 text-center text-gray-400 text-sm"><i class="fas fa-link text-3xl mb-2 block opacity-30"></i>Belum ada artikel link. Klik "Tambah Berita (Link)" untuk mulai.</div>':`<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-surface-alt dark:bg-surface-border/50 text-left"><th class="px-5 py-3 font-semibold text-xs text-gray-500 uppercase">Judul</th><th class="px-4 py-3 font-semibold text-xs text-gray-500 uppercase hidden sm:table-cell">Link</th><th class="px-4 py-3 font-semibold text-xs text-gray-500 uppercase text-right">Aksi</th></tr></thead><tbody>${arts.map(a=>`<tr class="border-t border-gray-50 dark:border-surface-border/50 hover:bg-surface-alt/50 transition"><td class="px-5 py-3"><div class="flex items-center gap-3"><img src="${a.featured_media}" alt="" class="w-12 h-9 rounded object-cover shrink-0 hidden sm:block" loading="lazy"><div class="min-w-0"><p class="font-medium line-clamp-1">${a.title}</p><span class="text-[10px] text-gray-400">${fmtDate(a.date)}</span></div></div></td><td class="px-4 py-3 hidden sm:table-cell"><a href="${a.ext_link}" target="_blank" class="text-xs text-blue-500 hover:underline line-clamp-1 block max-w-[200px]">${a.ext_link}</a></td><td class="px-4 py-3 text-right"><button onclick="delLocal(${a.id})" class="w-8 h-8 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 flex items-center justify-center transition inline-flex"><i class="fas fa-trash text-xs"></i></button></td></tr>`).join('')}</tbody></table></div>`}
        </div>
    </section>`;
}

function renderAdminLogin(){
    document.getElementById('mc').innerHTML=`<section class="max-w-md mx-auto px-4 py-20 animate-fadeUp"><div class="bg-white dark:bg-surface-card rounded-2xl p-8 border border-gray-200 dark:border-surface-border shadow-lg text-center"><div class="w-16 h-16 bg-brand/10 rounded-2xl flex items-center justify-center mx-auto mb-5"><i class="fas fa-user-shield text-2xl text-brand"></i></div><h1 class="text-xl font-bold mb-1 font-headline">Admin Login</h1><p class="text-sm text-gray-400 mb-6">Masuk untuk mengelola berita</p><div class="space-y-4 text-left"><div><label class="text-xs font-semibold text-gray-500 uppercase mb-1.5 block">Username</label><input type="text" id="au" value="admin" class="w-full h-11 px-4 rounded-xl border border-gray-200 dark:border-surface-border bg-surface-alt dark:bg-surface-dark text-sm focus:outline-none focus:ring-2 focus:ring-brand/40 transition"></div><div><label class="text-xs font-semibold text-gray-500 uppercase mb-1.5 block">Password</label><input type="password" id="ap" value="admin123" class="w-full h-11 px-4 rounded-xl border border-gray-200 dark:border-surface-border bg-surface-alt dark:bg-surface-dark text-sm focus:outline-none focus:ring-2 focus:ring-brand/40 transition"></div><button onclick="const u=document.getElementById('au').value,p=document.getElementById('ap').value;if(u==='admin'&&p==='admin123'){S.admin=true;localStorage.setItem('bk-a','true');toast('Login berhasil!');render();}else toast('Salah','error')" class="w-full h-11 bg-brand hover:bg-brand-dark text-white rounded-xl font-semibold text-sm transition">Masuk</button></div><p class="text-xs text-gray-400 mt-5">Default: admin / admin123</p></div></section>`;
}

function openForm(){
    const m=document.getElementById('am');m.classList.remove('hidden');
    document.getElementById('am-c').innerHTML=`<div class="bg-white dark:bg-surface-card rounded-2xl shadow-2xl animate-fadeUp overflow-hidden max-w-2xl mx-auto"><div class="px-6 py-4 border-b border-gray-200 dark:border-surface-border flex items-center justify-between"><h3 class="font-bold text-lg">Tambah Berita (Link)</h3><button onclick="closeAM()" class="w-8 h-8 rounded-full hover:bg-gray-100 dark:hover:bg-surface-border flex items-center justify-center"><i class="fas fa-times text-gray-400"></i></button></div><div class="p-6 space-y-4"><div><label class="text-xs font-semibold text-gray-500 uppercase mb-1.5 block">Judul Berita *</label><input type="text" id="f-title" class="w-full h-11 px-4 rounded-xl border border-gray-200 dark:border-surface-border bg-surface-alt dark:bg-surface-dark text-sm focus:outline-none focus:ring-2 focus:ring-brand/40 transition" placeholder="Judul berita"></div><div class="grid grid-cols-1 sm:grid-cols-2 gap-4"><div><label class="text-xs font-semibold text-gray-500 uppercase mb-1.5 block">Kategori</label><select id="f-cat" class="w-full h-11 px-4 rounded-xl border border-gray-200 dark:border-surface-border bg-surface-alt dark:bg-surface-dark text-sm focus:outline-none focus:ring-2 focus:ring-brand/40 transition">${CATS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div><div><label class="text-xs font-semibold text-gray-500 uppercase mb-1.5 block">Penulis</label><input type="text" id="f-author" value="Redaksi BeritaKini" class="w-full h-11 px-4 rounded-xl border border-gray-200 dark:border-surface-border bg-surface-alt dark:bg-surface-dark text-sm focus:outline-none focus:ring-2 focus:ring-brand/40 transition"></div></div><div><label class="text-xs font-semibold text-gray-500 uppercase mb-1.5 block">Link Artikel Tujuan *</label><input type="url" id="f-link" class="w-full h-11 px-4 rounded-xl border border-gray-200 dark:border-surface-border bg-surface-alt dark:bg-surface-dark text-sm focus:outline-none focus:ring-2 focus:ring-brand/40 transition" placeholder="https://situs-sumber.com/artikel"><p class="text-[11px] text-gray-400 mt-1"><i class="fas fa-info-circle mr-1"></i>Paste link sumber. Pengunjung dikirim ke link ini saat klik berita.</p></div><div><label class="text-xs font-semibold text-gray-500 uppercase mb-1.5 block">URL Gambar Thumbnail</label><input type="url" id="f-img" value="https://picsum.photos/seed/new-${Date.now()}/800/500" class="w-full h-11 px-4 rounded-xl border border-gray-200 dark:border-surface-border bg-surface-alt dark:bg-surface-dark text-sm focus:outline-none focus:ring-2 focus:ring-brand/40 transition"></div><div><label class="text-xs font-semibold text-gray-500 uppercase mb-1.5 block">Ringkasan *</label><textarea id="f-sum" rows="2" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-surface-border bg-surface-alt dark:bg-surface-dark text-sm focus:outline-none focus:ring-2 focus:ring-brand/40 transition resize-none" placeholder="Ringkasan singkat"></textarea></div><div><label class="text-xs font-semibold text-gray-500 uppercase mb-1.5 block">Tags (pisahkan koma)</label><input type="text" id="f-tags" class="w-full h-11 px-4 rounded-xl border border-gray-200 dark:border-surface-border bg-surface-alt dark:bg-surface-dark text-sm focus:outline-none focus:ring-2 focus:ring-brand/40 transition" placeholder="Contoh: Politik, Hukum"></div></div><div class="px-6 py-4 border-t border-gray-200 dark:border-surface-border flex gap-3"><button onclick="closeAM()" class="flex-1 h-11 rounded-xl border border-gray-200 dark:border-surface-border text-sm font-medium hover:bg-gray-50 dark:hover:bg-surface-border transition">Batal</button><button onclick="saveLocal()" class="flex-1 h-11 rounded-xl bg-brand hover:bg-brand-dark text-white text-sm font-semibold transition">Publikasikan</button></div></div>`;
}

function saveLocal(){
    const title=document.getElementById('f-title').value.trim();
    const link=document.getElementById('f-link').value.trim();
    const sum=document.getElementById('f-sum').value.trim();
    const img=document.getElementById('f-img').value.trim();
    const cat=parseInt(document.getElementById('f-cat').value);
    const author=document.getElementById('f-author').value.trim();
    const tags=document.getElementById('f-tags').value.split(',').map(t=>({name:t.trim(),slug:t.trim().toLowerCase()})).filter(t=>t.name);
    if(!title||!link||!sum){toast('Judul, link, ringkasan wajib diisi','error');return;}
    const arts=localStorage.getItem('bk-local')?JSON.parse(localStorage.getItem('bk-local')):[];
    const newId=arts.length>0?Math.max(...arts.map(a=>a.id))+1:DUMMY.length+1;
    const slug='link-'+Date.now();
    const catObj=CATS.find(c=>c.id===cat)||CATS[0];
    arts.unshift({id:newId,title,summary:sum,content:'<p>'+sum+'</p>',slug,category:cat,categories:[{id:cat,name:catObj.name,slug:catObj.slug}],tags,author:{name:author||'Redaksi',slug:''},date:new Date().toISOString(),featured_media:img||'https://picsum.photos/seed/def/800/500',views:0,headline:false,breaking:false,ext_link:link});
    localStorage.setItem('bk-local',JSON.stringify(arts));
    closeAM();toast('Berita link berhasil dipublikasikan!');render();
}

function delLocal(id){
    const arts=(localStorage.getItem('bk-local')?JSON.parse(localStorage.getItem('bk-local')):[]).filter(a=>a.id!==id);
    localStorage.setItem('bk-local',JSON.stringify(arts));toast('Dihapus','info');render();
}

function closeAM(){document.getElementById('am').classList.add('hidden');}

/* ========================================================================
   SEARCH
   ======================================================================== */
function openSearch(){document.getElementById('s-ov').classList.remove('hidden');setTimeout(()=>document.getElementById('s-in').focus(),100);}
function closeSearch(){document.getElementById('s-ov').classList.add('hidden');document.getElementById('s-in').value='';document.getElementById('s-res').innerHTML='';}
function doSearch(q){
    if(!q.trim()){document.getElementById('s-res').innerHTML='<div class="p-6 text-center text-sm text-gray-400">Ketik minimal 2 karakter</div>';return;}
    const r=DUMMY.filter(a=>a.title.toLowerCase().includes(q.toLowerCase())||a.summary.toLowerCase().includes(q.toLowerCase())||a.tags?.some(t=>t.name.toLowerCase().includes(q.toLowerCase())));
    if(!r.length){document.getElementById('s-res').innerHTML='<div class="p-6 text-center text-sm text-gray-400">Tidak ditemukan</div>';return;}
    document.getElementById('s-res').innerHTML=r.slice(0,8).map(a=>`<a href="${a.ext_link?a.ext_link:'#/artikel/'+a.slug}" ${a.ext_link?'target="_blank"':''} class="flex gap-3 p-4 hover:bg-surface-alt dark:hover:bg-surface-border/50 transition cursor-pointer border-b border-gray-50 dark:border-surface-border/30 last:border-0"><img src="${a.featured_media}" alt="" class="w-16 h-12 rounded-lg object-cover shrink-0" loading="lazy"><div class="min-w-0"><span class="cb ${a.categories?.length?catClsByObj(a.categories):catCls(a.category)} text-[10px] mb-0.5 inline-block">${a.categories?.length?catNameByObj(a.categories):catName(a.category)}</span><h4 class="text-sm font-semibold line-clamp-1">${a.title}</h4><p class="text-xs text-gray-400 mt-0.5">${a.author.name}</p></div></a>`).join('');
}

/* ========================================================================
   MOBILE MENU
   ======================================================================== */
function toggleMobile(){document.getElementById('mob-menu').classList.toggle('hidden');}

/* ========================================================================
   EVENT LISTENERS
   ======================================================================== */
window.addEventListener('scroll',()=>{const h=document.getElementById('main-header'),b=document.getElementById('btt');if(window.scrollY>10)h.classList.add('shadow-md');else h.classList.remove('shadow-md');if(window.scrollY>400){b.style.opacity='1';b.style.transform='translateY(0)';b.style.pointerEvents='auto';}else{b.style.opacity='0';b.style.transform='translateY(16px)';b.style.pointerEvents='none';}},{passive:true});
document.getElementById('s-in').addEventListener('input',e=>doSearch(e.target.value));
document.getElementById('s-in').addEventListener('keydown',e=>{if(e.key==='Enter'){const q=e.target.value.trim();if(q){closeSearch();navigate('/cari/'+encodeURIComponent(q));}}});
document.getElementById('search-d').addEventListener('keydown',e=>{if(e.key==='Enter'){const q=e.target.value.trim();if(q){e.target.value='';navigate('/cari/'+encodeURIComponent(q));}}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeSearch();closeAM();const mm=document.getElementById('mob-menu');if(!mm.classList.contains('hidden'))toggleMobile();}});
window.addEventListener('hashchange',handleRoute);

/* ========================================================================
   INIT
   ======================================================================== */
applyDark();
renderTicker();
handleRoute();
</script>
</body>
</html>
